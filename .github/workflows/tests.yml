name: tests

on:
  push:
    branches:
      - dev

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    runs-on: ubuntu-latest
    environment: Testing
    strategy:
      matrix:
        php-version: ['8.5']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Node Dependencies
        run: npm i

      - name: Add Flux Credentials Loaded From ENV
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Create SQLite Database
        run: touch database/database.sqlite

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Run Database Migrations
        run: php artisan migrate --force

      - name: Build Assets
        run: npm run build

      - name: Run Tests
        run: ./vendor/bin/pest

  create-pr:
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Create pull request to main
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          existing_pr="$(gh pr list --base main --head dev --state open --json number --jq '.[0].number')"

          if [ -n "$existing_pr" ]; then
            echo "Pull request #$existing_pr already exists."
            exit 0
          fi

          gh pr create \
            --base main \
            --head dev \
            --title "Merge dev into main" \
            --body "Automated PR created after the dev test workflow completed successfully. A human should review and merge this PR when ready."
